# Render deployment blueprint.
# In Render: New > Blueprint, point at this repo, then set the two passwords.
services:
  - type: web
    name: property-manager
    runtime: python
    plan: starter            # $7/mo — required for the persistent disk below
    branch: main
    buildCommand: ""         # nothing to build (Python standard library only)
    startCommand: python3 app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"      # app uses the `cgi` module, removed in Python 3.13
      - key: ADMIN_PASSWORD
        sync: false          # set in the Render dashboard (do not commit)
      - key: WORKER_PASSWORD
        sync: false          # set in the Render dashboard (do not commit)
    disk:
      name: data
      mountPath: /opt/render/project/src/data   # persists db.json, tasks, and all uploads
      sizeGB: 1
